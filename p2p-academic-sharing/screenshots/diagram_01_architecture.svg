<svg width="900" height="620" viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>
  <!-- Subtle glow -->
  <ellipse cx="450" cy="80" rx="300" ry="100" fill="#38bdf8" fill-opacity="0.03"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="42" fill="#161d2e"/>
  <rect x="0" y="42" width="900" height="1" fill="#38bdf8" fill-opacity="0.2"/>
  <text x="24" y="15" font-family="'Courier New', monospace" font-size="10" fill="#64748b" letter-spacing="2">P2P ACADEMIC RESOURCE SHARING NETWORK</text>
  <text x="24" y="30" font-family="'Courier New', monospace" font-size="10" fill="#38bdf8" fill-opacity="0.6">// SYSTEM ARCHITECTURE</text>
  <text x="876" y="22" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="end">diagram_01</text>

  <!-- Title -->
  <text x="450" y="80" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.5">P2P Academic Resource Sharing</text>
  <text x="450" y="100" font-size="13" fill="#64748b" text-anchor="middle">Java peer-to-peer network · UDP discovery · TCP transfer · SHA-256 integrity</text>

  <!-- ── PeerNode (top center) ── -->
  <rect x="340" y="126" width="220" height="64" rx="10" fill="#1a2438" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="340" y="126" width="220" height="64" rx="10" fill="#38bdf8" fill-opacity="0.05"/>
  <!-- ENTRY badge -->
  <rect x="352" y="134" width="44" height="16" rx="3" fill="#38bdf8" fill-opacity="0.15"/>
  <rect x="352" y="134" width="44" height="16" rx="3" stroke="#38bdf8" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <text x="374" y="145" font-family="'Courier New', monospace" font-size="9" fill="#38bdf8" text-anchor="middle" font-weight="600">ENTRY</text>
  <text x="450" y="160" font-size="14" font-weight="600" fill="#38bdf8" text-anchor="middle">PeerNode.java</text>
  <text x="450" y="178" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">Main Entry Point · CLI + Orchestration</text>

  <!-- ── UDPDiscovery (left) ── -->
  <rect x="60" y="266" width="200" height="72" rx="10" fill="#1a2438" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="72" y="274" width="44" height="16" rx="3" fill="#a78bfa" fill-opacity="0.15"/>
  <rect x="72" y="274" width="44" height="16" rx="3" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.4" fill="none"/>
  <text x="94" y="285" font-family="'Courier New', monospace" font-size="9" fill="#a78bfa" text-anchor="middle" font-weight="600">UDP</text>
  <text x="160" y="302" font-size="13" font-weight="600" fill="#a78bfa" text-anchor="middle">UDPDiscovery.java</text>
  <text x="160" y="319" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">UDP Broadcast · Port 9000</text>
  <text x="160" y="331" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">Peer Registry</text>

  <!-- ── TCPServer (center) ── -->
  <rect x="340" y="266" width="220" height="72" rx="10" fill="#1a2438" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="352" y="274" width="34" height="16" rx="3" fill="#22c55e" fill-opacity="0.12"/>
  <rect x="352" y="274" width="34" height="16" rx="3" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <text x="369" y="285" font-family="'Courier New', monospace" font-size="9" fill="#22c55e" text-anchor="middle" font-weight="600">TCP</text>
  <text x="450" y="302" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">TCPServer.java</text>
  <text x="450" y="319" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">TCP Server · Port 6000+</text>
  <text x="450" y="331" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">LIST + GET</text>

  <!-- ── TCPClient (right) ── -->
  <rect x="640" y="266" width="200" height="72" rx="10" fill="#1a2438" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="652" y="274" width="46" height="16" rx="3" fill="#f97316" fill-opacity="0.12"/>
  <rect x="652" y="274" width="46" height="16" rx="3" stroke="#f97316" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <text x="675" y="285" font-family="'Courier New', monospace" font-size="9" fill="#f97316" text-anchor="middle" font-weight="600">CLIENT</text>
  <text x="740" y="302" font-size="13" font-weight="600" fill="#f97316" text-anchor="middle">TCPClient.java</text>
  <text x="740" y="319" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">TCP Client · Download + Retry</text>
  <text x="740" y="331" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle"></text>

  <!-- ── IntegrityChecker (right lower) ── -->
  <rect x="600" y="400" width="220" height="72" rx="10" fill="#1a2438" stroke="#ef4444" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="612" y="408" width="34" height="16" rx="3" fill="#ef4444" fill-opacity="0.12"/>
  <rect x="612" y="408" width="34" height="16" rx="3" stroke="#ef4444" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <text x="629" y="419" font-family="'Courier New', monospace" font-size="9" fill="#ef4444" text-anchor="middle" font-weight="600">SHA</text>
  <text x="710" y="436" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">IntegrityChecker.java</text>
  <text x="710" y="453" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">SHA-256 Verify · 3 Retries</text>
  <text x="710" y="465" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle"></text>

  <!-- ── FileManager (bottom center) ── -->
  <rect x="300" y="400" width="220" height="72" rx="10" fill="#1a2438" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="312" y="408" width="40" height="16" rx="3" fill="#f59e0b" fill-opacity="0.12"/>
  <rect x="312" y="408" width="40" height="16" rx="3" stroke="#f59e0b" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <text x="332" y="419" font-family="'Courier New', monospace" font-size="9" fill="#f59e0b" text-anchor="middle" font-weight="600">FILES</text>
  <text x="410" y="436" font-size="13" font-weight="600" fill="#f59e0b" text-anchor="middle">FileManager.java</text>
  <text x="410" y="453" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle">File Index · SHA-256 · Path Safety</text>
  <text x="410" y="465" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle"></text>

  <!-- ── Arrows ── -->
  <!-- PeerNode → UDPDiscovery -->
  <path d="M 370 190 L 160 266" stroke="#a78bfa" stroke-width="1.2" stroke-opacity="0.7" fill="none" marker-end="url(#arr-purple)"/>
  <text x="230" y="226" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle" transform="rotate(-28,230,226)">starts</text>

  <!-- PeerNode → TCPServer -->
  <line x1="450" y1="190" x2="450" y2="266" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arr-green)"/>
  <text x="465" y="232" font-family="'Courier New', monospace" font-size="10" fill="#64748b">starts</text>

  <!-- PeerNode → TCPClient -->
  <path d="M 540 190 L 740 266" stroke="#f97316" stroke-width="1.2" stroke-opacity="0.7" fill="none" marker-end="url(#arr)"/>
  <text x="670" y="226" font-family="'Courier New', monospace" font-size="10" fill="#64748b" text-anchor="middle" transform="rotate(28,670,226)">uses</text>

  <!-- TCPServer → FileManager -->
  <path d="M 450 338 L 430 400" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.7" fill="none" marker-end="url(#arr-amber)"/>
  <text x="420" y="374" font-family="'Courier New', monospace" font-size="9" fill="#64748b" text-anchor="end">reads/serves files</text>

  <!-- TCPClient → IntegrityChecker -->
  <line x1="740" y1="338" x2="720" y2="400" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arr)"/>
  <text x="748" y="374" font-family="'Courier New', monospace" font-size="9" fill="#64748b">verify download</text>

  <!-- IntegrityChecker → FileManager -->
  <line x1="600" y1="440" x2="520" y2="440" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.7" marker-end="url(#arr-amber)"/>
  <text x="558" y="432" font-family="'Courier New', monospace" font-size="9" fill="#64748b" text-anchor="middle">compute checksum</text>

  <!-- UDPDiscovery → FileManager -->
  <path d="M 200 338 L 340 420" stroke="#f59e0b" stroke-width="1.2" stroke-opacity="0.5" stroke-dasharray="5 3" fill="none" marker-end="url(#arr-amber)"/>
  <text x="248" y="386" font-family="'Courier New', monospace" font-size="9" fill="#64748b" transform="rotate(33,248,386)">reads file count</text>

  <!-- ── Peer A / Peer B interaction at bottom ── -->
  <rect x="60" y="516" width="120" height="44" rx="8" fill="#1a2438" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.4"/>
  <text x="120" y="543" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Peer A</text>

  <rect x="720" y="516" width="120" height="44" rx="8" fill="#1a2438" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
  <text x="780" y="543" font-size="14" font-weight="600" fill="#e2e8f0" text-anchor="middle">Peer B</text>

  <!-- PEER_ANNOUNCE arrow (dashed, bidirectional) -->
  <line x1="184" y1="530" x2="716" y2="530" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.5" stroke-dasharray="6 4" marker-end="url(#arr-cyan)"/>
  <rect x="330" y="520" width="240" height="16" rx="3" fill="#0d1117"/>
  <text x="450" y="531" font-family="'Courier New', monospace" font-size="10" fill="#38bdf8" text-anchor="middle" fill-opacity="0.8">PEER_ANNOUNCE every 10s · UDP</text>

  <!-- GET / SIZE+CHECKSUM / binary arrow -->
  <line x1="716" y1="550" x2="184" y2="550" stroke="#22c55e" stroke-width="1.2" stroke-opacity="0.6" marker-end="url(#arr-green)"/>
  <rect x="330" y="539" width="240" height="16" rx="3" fill="#0d1117"/>
  <text x="450" y="550" font-family="'Courier New', monospace" font-size="10" fill="#22c55e" text-anchor="middle" fill-opacity="0.8">GET / SIZE+CHECKSUM / binary · TCP</text>

  <!-- Footer -->
  <rect x="0" y="599" width="900" height="21" fill="#161d2e"/>
  <text x="24" y="614" font-family="'Courier New', monospace" font-size="9" fill="#64748b">Stack: Java · UDP/TCP Sockets · SHA-256 · ConcurrentHashMap · CachedThreadPool</text>
  <text x="876" y="614" font-family="'Courier New', monospace" font-size="9" fill="#64748b" text-anchor="end">Prepared by: Harry Joseph</text>
</svg>
